<style>
  :root {
    /* Palette — deep navy for the Call app (nights + evenings), gold accent */
    --bg: #F7F4EF;
    --card: #FFFFFF;
    --text: #0D2E3A;
    --muted: #6B8B96;
    --comment: #324A56;
    --border: #DCD6CC;
    --accent: #0D2E3A;
    --accent-dark: #061A24;
    --gold: #E8A020;
    --gold-light: #F5C842;
    --notes-bg: #FFF3D0;
    --notes-txt: #0A2E3A;
    /* Group-specific colours — reused across headers and chip fills */
    --grp-wkday-eve: #0D4F5C;
    --grp-wkend-day: #C08010;
    --grp-wkend-eve: #B85A3F;
    --grp-overnight: #4C3F7A;
    --grp-wkday-eve-bg: #DDE8EC;
    --grp-wkend-day-bg: #F7E6C2;
    --grp-wkend-eve-bg: #F5DDD5;
    --grp-overnight-bg: #E2DDF0;
    --red: #C0392B;
    --check-bg: #34c759;
    --check-bg-disabled: #d8d8de;
    --shadow: 0 1px 3px rgba(13,46,58,0.08), 0 4px 12px rgba(13,46,58,0.04);
  }
  :root[data-theme="dark"] {
    --bg: #0E1820;
    --card: #162028;
    --text: #FFFFFF;
    --muted: #FFFFFF;
    --comment: #FFFFFF;
    --border: #233340;
    --accent: #1A4258;
    --accent-dark: #0E2A38;
    --gold: #F5C842;
    --gold-light: #FFDD70;
    --notes-bg: #3A2E0E;
    --notes-txt: #F5C842;
    --shadow: 0 1px 3px rgba(0,0,0,0.4);
    --grp-wkday-eve-bg: #163848;
    --grp-wkend-day-bg: #3D2E0A;
    --grp-wkend-eve-bg: #3A1E18;
    --grp-overnight-bg: #2A2540;
  }
  /* Dark-mode readability tweaks — same pattern as the RR app */
  :root[data-theme="dark"] .selector-toggle-btn:not(.confirmed) {
    color: #FFFFFF;
    border-color: #FFFFFF;
  }
  :root[data-theme="dark"] .rotation-day-tag { color: #FFFFFF; }
  :root[data-theme="dark"] .rotation-shift-tag { color: #FFFFFF; }
  :root[data-theme="dark"] .chip-subtitle { color: #E0E8F0; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    background: var(--accent);
    color: white;
    padding: 6px 12px;
    padding-top: calc(6px + env(safe-area-inset-top));
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .h-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .h-left {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .h-logo {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
    display: block;
    border-radius: 12px;
    overflow: hidden;
    background: var(--accent-dark);
  }
  .h-logo img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }
  /* On task-checked the whole badge does a subtle spin */
  .h-logo.spinning img {
    animation: badgeSpin 1.0s cubic-bezier(0.34, 1.15, 0.5, 1) 1 both;
  }
  @keyframes badgeSpin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .h-logo.spinning img { animation: none; }
  }
  .title {
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0;
    line-height: 1.2;
  }
  .version {
    font-size: 10px;
    opacity: 0.95;
    white-space: nowrap;
    font-weight: 500;
    color: var(--gold-light);
    letter-spacing: 0.04em;
  }
  .h-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .theme-toggle {
    display: inline-flex;
    background: rgba(255,255,255,0.18);
    border-radius: 14px;
    padding: 3px;
  }
  .theme-opt {
    background: transparent;
    color: rgba(255,255,255,0.75);
    border: none;
    width: 36px;
    height: 32px;
    border-radius: 14px;
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.18s ease, color 0.18s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .theme-opt.active {
    background: white;
    color: var(--accent);
    font-weight: 700;
  }
  .menu-btn {
    background: rgba(255,255,255,0.92);
    color: #C00000;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-btn:active { background: #fff; }
  .font-sizer {
    display: inline-flex;
    align-items: center;
    background: rgba(255,255,255,0.16);
    border-radius: 16px;
    padding: 3px;
    gap: 1px;
  }
  .font-sizer button {
    background: transparent;
    color: white;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 13px;
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .font-sizer button:active { background: rgba(255,255,255,0.28); }
  .font-sizer button[disabled] { opacity: 0.4; cursor: default; }
  .font-sizer .small  { font-size: 11px; }
  .font-sizer .large  { font-size: 16px; }
  .h-meta {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
    margin-top: 3px;
    font-size: 11px;
    opacity: 0.9;
  }
  .selector-toggle-row {
    display: flex;
    justify-content: flex-end;
    margin: 0 0 6px 0;
  }
  .selector-toggle-btn {
    background: var(--card);
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 999px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-align: center;
    line-height: 1.3;
    -webkit-tap-highlight-color: transparent;
  }
  .selector-toggle-btn:active { background: var(--bg); }
  .selector-toggle-btn.confirmed {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .selector-toggle-btn.confirmed:active {
    background: var(--accent);
    filter: brightness(0.92);
  }
  .cta-flash {
    font-weight: 800;
    color: #C00000;
  }
  .selector-toggle-btn.confirmed .cta-flash {
    color: inherit;
  }
  .menu-version {
    padding: 14px 18px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  /* ---- In-app PDF viewer ---- */
  .pdf-viewer {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }
  .pdf-viewer[hidden] { display: none; }
  .pdf-viewer-header {
    background: var(--accent);
    color: white;
    padding: 10px 12px;
    padding-top: calc(10px + env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.18);
  }
  .pdf-viewer-title {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pdf-viewer-close {
    background: rgba(255,255,255,0.18);
    color: white;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .pdf-viewer-close:active { background: rgba(255,255,255,0.32); }
  .pdf-viewer iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: var(--bg);
  }
  .pdf-viewer-fallback {
    background: rgba(255,255,255,0.12);
    color: white;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 14px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* ---- Menu sheet ---- */
  .menu-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: m-fade 0.18s ease;
  }
  .menu-overlay[hidden] { display: none; }
  .menu-sheet {
    background: var(--card);
    width: 100%;
    max-width: 480px;
    border-radius: 16px 16px 0 0;
    padding: 8px 8px max(12px, env(safe-area-inset-bottom)) 8px;
    animation: m-up 0.25s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 85vh;
    overflow-y: auto;
  }
  .menu-section-label {
    padding: 8px 18px 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .menu-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 6px 18px 12px;
  }
  .menu-controls-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  /* In-menu control clones use the same visual as their header counterparts,
     but tinted for a card background instead of the coloured header. */
  .menu-controls-row .font-sizer,
  .menu-controls-row .theme-toggle {
    background: var(--bg);
  }
  .menu-controls-row .font-sizer button,
  .menu-controls-row .theme-opt {
    color: var(--text);
  }
  .menu-controls-row .theme-opt.active {
    background: var(--accent);
    color: #fff;
  }
  .menu-item {
    display: block;
    width: 100%;
    padding: 16px 18px;
    background: transparent;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 500;
    text-align: left;
    color: var(--text);
    cursor: pointer;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-item:active {
    background: var(--bg);
  }
  .menu-item + .menu-item {
    margin-top: 2px;
  }
  .menu-item.cancel {
    border-top: 1px solid var(--border);
    margin-top: 8px;
    padding-top: 16px;
    text-align: center;
    color: var(--accent);
    font-weight: 600;
  }
  @keyframes m-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes m-up   { from { transform: translateY(100%); } to { transform: translateY(0); } }

  /* ---- Selector controls ---- */
  .controls {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 14px;
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .controls-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    color: var(--muted);
    margin: 4px 0 8px;
  }
  .today-date {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin: 2px 0 10px;
    line-height: 1.2;
  }
  .today-date .prefix {
    color: var(--muted);
    font-weight: 400;
    margin-right: 6px;
  }
  .progress {
    font-size: 11px;
    opacity: 0.95;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .progress-bar {
    width: 50px;
    height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: white;
    transition: width 0.25s ease;
  }
  /* Disclosure sections (rotation picker) */
  .disclosure {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 12px;
    margin-top: 10px;
    overflow: hidden;
  }
  .disclosure summary {
    padding: 11px 14px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .disclosure summary::-webkit-details-marker { display: none; }
  .disclosure summary::after {
    content: "›";
    transform: rotate(90deg);
    font-size: 18px;
    transition: transform 0.2s;
    color: var(--muted);
    font-weight: 400;
  }
  .disclosure[open] summary::after {
    transform: rotate(-90deg);
  }
  .disclosure-body {
    padding: 0 12px 10px;
  }
  /* Per-group dropdowns inside the picker */
  .group-disclosure {
    border-bottom: 1px solid var(--border);
  }
  .group-disclosure:last-child { border-bottom: none; }
  .group-disclosure summary {
    cursor: pointer;
    list-style: none;
    padding: 10px 0;
    display: flex;
    align-items: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .group-disclosure summary::-webkit-details-marker { display: none; }
  .group-disclosure summary::before {
    content: "›";
    margin-right: 10px;
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
    transition: transform 0.2s ease;
    display: inline-block;
    width: 12px;
  }
  .group-disclosure[open] summary::before {
    transform: rotate(90deg);
  }
  .group-disclosure-count {
    margin-left: auto;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
  }
  .group-disclosure-count.zero {
    color: var(--muted);
    font-weight: 400;
  }
  /* Rotation chips — Call app uses vertical rows so the day + shift subtitle
     under the rotation name fits comfortably. */
  .rotation-chips {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 4px 0 12px;
  }
  .rotation-chip {
    padding: 10px 12px;
    border-radius: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s ease;
    line-height: 1.25;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .rotation-chip.selected {
    color: white;
    border-color: transparent;
  }
  .rotation-chip.selected[data-token="wkday-eve"] { background: var(--grp-wkday-eve); }
  .rotation-chip.selected[data-token="wkend-day"] { background: var(--grp-wkend-day); }
  .rotation-chip.selected[data-token="wkend-eve"] { background: var(--grp-wkend-eve); }
  .rotation-chip.selected[data-token="overnight"] { background: var(--grp-overnight); }
  .chip-title {
    font-weight: 600;
    font-size: 15px;
  }
  .chip-subtitle {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .rotation-chip.selected .chip-subtitle { color: rgba(255,255,255,0.9); }
  .picker-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    position: sticky;
    top: 0;
    padding: 4px 0;
    background: var(--card);
    z-index: 1;
  }
  .picker-actions button {
    flex: 1;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .picker-actions button.picker-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .picker-actions button.picker-primary:active {
    background: var(--accent-dark);
  }
  /* Back-to-selector CTA inside the task view.
     Mirrors the "Reset selection" button styling so text stays readable in
     both light and dark modes (var(--text) is white in dark mode). */
  .back-to-selector {
    display: block;
    width: 100%;
    padding: 10px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin: 4px 0 14px;
    -webkit-tap-highlight-color: transparent;
  }
  .back-to-selector:active { background: var(--card); }
  /* Tasks list */
  main {
    padding: 14px 12px 60px;
    max-width: 720px;
    margin: 0 auto;
  }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 15px;
  }
  .empty .icon {
    font-size: 40px;
    margin-bottom: 10px;
    display: block;
  }
  .rotation-block {
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .rotation-header {
    padding: 11px 14px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .rotation-header[data-token="wkday-eve"] { background: var(--grp-wkday-eve-bg); }
  .rotation-header[data-token="wkend-day"] { background: var(--grp-wkend-day-bg); }
  .rotation-header[data-token="wkend-eve"] { background: var(--grp-wkend-eve-bg); }
  .rotation-header[data-token="overnight"] { background: var(--grp-overnight-bg); }
  .rotation-header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .rotation-name {
    font-weight: 700;
    font-size: 15px;
    line-height: 1.3;
  }
  .rotation-day-tag {
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }
  .rotation-shift-tag {
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }
  .rotation-subtitle {
    font-size: 12px;
    color: var(--comment);
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  /* Confetti celebration when a rotation is fully checked off */
  .confetti-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 9999;
  }
  .confetti-piece {
    position: absolute;
    top: 0;
    left: 0;
    border-radius: 2px;
    opacity: 0.95;
    will-change: transform;
  }
  .rotation-meta {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .task {
    display: flex;
    align-items: flex-start;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    cursor: pointer;
  }
  .task:last-child {
    border-bottom: none;
  }
  .task.done .task-name,
  .task.done .task-time {
    text-decoration: line-through;
    opacity: 0.55;
  }
  .task.done .task-comments,
  .task.done .task-worklist,
  .task.done .task-segment {
    opacity: 0.55;
  }
  .check {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .check {
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .task.done .check {
    background: var(--check-bg);
    border-color: var(--check-bg);
  }
  .task.done .check::after {
    content: "";
    width: 6px;
    height: 11px;
    border-right: 2.5px solid white;
    border-bottom: 2.5px solid white;
    transform: rotate(45deg) translate(-1px, -2px);
  }
  .task.just-checked.done .check::after {
    animation: check-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .task.just-checked {
    animation: task-flash 0.6s ease;
  }
  @keyframes check-pop {
    0%   { transform: rotate(45deg) translate(-1px, -2px) scale(0); opacity: 0; }
    55%  { transform: rotate(45deg) translate(-1px, -2px) scale(1.35); opacity: 1; }
    100% { transform: rotate(45deg) translate(-1px, -2px) scale(1); }
  }
  @keyframes task-flash {
    0%, 100% { background: transparent; }
    25%      { background: rgba(52, 199, 89, 0.18); }
  }
  @supports (view-transition-name: a) {
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation-duration: 0.28s;
      animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .task.just-checked,
    .task.just-checked.done .check::after { animation: none !important; }
  }
  .task-body { flex: 1; min-width: 0; }
  .task-row1 {
    display: flex;
    gap: 10px;
    align-items: baseline;
    flex-wrap: wrap;
  }
  .task-time {
    font-size: 12px;
    font-weight: 600;
    color: white;
    background: var(--accent);
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .task-time.start-time {
    color: white;
    background: var(--red);
  }
  .task-name {
    font-weight: 600;
    font-size: 15px;
    margin-top: 5px;
    line-height: 1.35;
  }
  .task-meta {
    margin-top: 4px;
    font-size: 14px;
    color: var(--comment);
    line-height: 1.45;
  }
  .task-meta b { color: var(--text); font-weight: 600; }
  .task-comments {
    margin-top: 4px;
    font-size: 14px;
    line-height: 1.45;
    color: var(--comment);
    white-space: pre-wrap;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    padding: 12px 16px 24px;
  }
  .reset-button {
    display: block;
    margin: 8px auto 0;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
  }
</style>
</head>

// ---------- state ----------
const STATE_KEY = 'thp-call-app-state';
const CHECKS_KEY_PREFIX = 'thp-call-checks-';

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

function saveState() {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      rotations: [...state.selectedRotations],
      theme: state.theme,
      selectorHidden: state.selectorHidden,
      fontScale: state.fontScale,
      savedDate: new Date().toISOString().slice(0, 10),
    }));
  } catch (e) {}
}

function todayKey() {
  const d = new Date();
  return CHECKS_KEY_PREFIX + d.toISOString().slice(0, 10);
}

function loadTodaysChecks() {
  const today = todayKey();
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const k = localStorage.key(i);
    if (k && k.startsWith(CHECKS_KEY_PREFIX) && k !== today) {
      localStorage.removeItem(k);
    }
  }
  try {
    const raw = localStorage.getItem(today);
    if (raw) return new Set(JSON.parse(raw));
  } catch (e) {}
  return new Set();
}

function saveChecks() {
  try {
    localStorage.setItem(todayKey(), JSON.stringify([...state.checks]));
  } catch (e) {}
}

function formatToday() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
}

const persisted = loadState() || {};
const _today = new Date().toISOString().slice(0, 10);
const _sameDay = persisted.savedDate === _today;
// Call app: never auto-select a rotation. Even mid-day resumes start empty
// from the *rotation* standpoint — the user picks the shift they're on.
// Selector visibility also resets each day.
const state = {
  selectedRotations: new Set(_sameDay ? (persisted.rotations || []) : []),
  theme: persisted.theme || 'light',
  selectorHidden: _sameDay ? !!persisted.selectorHidden : false,
  fontScale: typeof persisted.fontScale === 'number' ? persisted.fontScale : 1.0,
  checks: loadTodaysChecks(),
  _justChecked: null,
};

function setTheme(theme) {
  state.theme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  ['themeLightBtn', 'menuThemeLightBtn'].forEach(id => {
    const b = document.getElementById(id);
    if (b) b.classList.toggle('active', theme === 'light');
  });
  ['themeDarkBtn', 'menuThemeDarkBtn'].forEach(id => {
    const b = document.getElementById(id);
    if (b) b.classList.toggle('active', theme === 'dark');
  });
  saveState();
}

// Apply theme immediately to avoid a light→dark flash on load
document.documentElement.setAttribute('data-theme', state.theme);

// ---------- helpers ----------
function groupForRotation(rotation) {
  for (const [g, list] of Object.entries(APP_DATA.groups)) {
    if (list.includes(rotation)) return g;
  }
  return null;
}

function tokenForRotation(rotation) {
  const g = groupForRotation(rotation);
  if (!g) return '';
  return APP_DATA.group_token[g] || '';
}

function timeSortKey(t) {
  t = (t || '').trim();
  if (!t) return [9, 999];
  let m = t.match(/(?<!\d)(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
  if (m) {
    let h = parseInt(m[1], 10), mi = parseInt(m[2] || '0', 10);
    const ampm = m[3].toUpperCase();
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    return [1, h * 60 + mi];
  }
  m = t.match(/(?<!\d)(\d{1,2}):(\d{2})/);
  if (m) {
    const h = parseInt(m[1], 10), mi = parseInt(m[2], 10);
    if (h <= 23 && mi <= 59) return [1, h * 60 + mi];
  }
  if (/\bAM\b/i.test(t)) return [2, 480];
  if (/\bPM\b/i.test(t)) return [2, 720];
  return [9, 0];
}

function compareTimes(a, b) {
  const ka = timeSortKey(a), kb = timeSortKey(b);
  if (ka[0] !== kb[0]) return ka[0] - kb[0];
  return ka[1] - kb[1];
}

function rowKey(row) {
  return row.rotation + '|' + row.task + '|' + row.time + '|' + row.day;
}

// ---------- rendering ----------
function renderHeader() {
  const mv = document.getElementById('menuVersion');
  if (mv) mv.textContent = 'VERSION ' + APP_DATA.version_date;
}

// ---------- font-size scaling ----------
const FONT_MIN = 0.85;
const FONT_MAX = 1.45;
const FONT_STEP = 0.1;
function applyFontScale() {
  if (state.fontScale < FONT_MIN) state.fontScale = FONT_MIN;
  if (state.fontScale > FONT_MAX) state.fontScale = FONT_MAX;
  const scope = document.getElementById('scaleScope');
  if (scope) scope.style.zoom = state.fontScale;
  ['fontDownBtn', 'menuFontDownBtn'].forEach(id => {
    const b = document.getElementById(id);
    if (b) b.disabled = state.fontScale <= FONT_MIN + 0.001;
  });
  ['fontUpBtn', 'menuFontUpBtn'].forEach(id => {
    const b = document.getElementById(id);
    if (b) b.disabled = state.fontScale >= FONT_MAX - 0.001;
  });
}
function bumpFont(delta) {
  state.fontScale = Math.round((state.fontScale + delta) * 100) / 100;
  applyFontScale();
  saveState();
}

// ---------- show/hide rotation selector ----------
function applySelectorVisibility() {
  const block = document.getElementById('selectorBlock');
  const btn = document.getElementById('selectorToggleBtn');
  if (!block || !btn) return;
  if (state.selectorHidden) {
    block.style.display = 'none';
    btn.textContent = 'Show rotation selector';
    btn.classList.add('confirmed');
  } else {
    block.style.display = '';
    btn.innerHTML = '<span class="cta-flash">Click here</span> to confirm rotation selection and close the selector';
    btn.classList.remove('confirmed');
  }
}

function renderTodayDate() {
  const el = document.getElementById('todayDate');
  if (!el) return;
  el.innerHTML = '<span class="prefix">Today is</span>' + formatToday();
}

function renderRotationPicker() {
  const el = document.getElementById('rotationPicker');
  el.innerHTML = '';
  for (const [group, rotations] of Object.entries(APP_DATA.groups)) {
    const det = document.createElement('details');
    det.className = 'group-disclosure';
    det.dataset.token = APP_DATA.group_token[group] || '';

    const summary = document.createElement('summary');
    const label = document.createElement('span');
    label.textContent = group;
    summary.appendChild(label);
    const count = document.createElement('span');
    count.className = 'group-disclosure-count zero';
    count.dataset.group = group;
    count.textContent = '';
    summary.appendChild(count);
    det.appendChild(summary);

    const chipBox = document.createElement('div');
    chipBox.className = 'rotation-chips';
    for (const rot of rotations) {
      const chip = document.createElement('div');
      const meta = APP_DATA.rotation_meta[rot] || {};
      chip.className = 'rotation-chip' + (state.selectedRotations.has(rot) ? ' selected' : '');
      chip.dataset.token = APP_DATA.group_token[group] || '';

      const title = document.createElement('div');
      title.className = 'chip-title';
      title.textContent = rot;
      chip.appendChild(title);

      // Subtitle: "<day tag> · <shift time>" — mirrors what shows on the
      // rotation header once tasks are visible, so the picker gives the user
      // the same context.
      const subParts = [];
      if (meta.day) subParts.push(meta.day);
      if (meta.shift) subParts.push(meta.shift);
      if (subParts.length) {
        const sub = document.createElement('div');
        sub.className = 'chip-subtitle';
        sub.textContent = subParts.join(' · ');
        chip.appendChild(sub);
      }

      chip.addEventListener('click', () => {
        if (state.selectedRotations.has(rot)) {
          state.selectedRotations.delete(rot);
        } else {
          state.selectedRotations.add(rot);
        }
        saveState();
        renderRotationCount();
        chip.classList.toggle('selected');
        updateGroupCount(group);
        // Tasks are not rendered live while picking — they appear on confirm.
      });
      chipBox.appendChild(chip);
    }
    det.appendChild(chipBox);
    el.appendChild(det);
    updateGroupCount(group);
  }
}

function updateGroupCount(group) {
  const list = APP_DATA.groups[group] || [];
  const n = list.filter(r => state.selectedRotations.has(r)).length;
  const el = document.querySelector('.group-disclosure-count[data-group="' + cssEscape(group) + '"]');
  if (!el) return;
  el.textContent = n ? `${n} selected` : '';
  el.classList.toggle('zero', n === 0);
}

function cssEscape(s) {
  // Minimal attribute-selector-safe escape — CSS.escape isn't universal on
  // older iOS; group names contain spaces but not quotes, so this works.
  return String(s).replace(/"/g, '\\"');
}

function renderRotationCount() {
  const n = state.selectedRotations.size;
  const lbl = document.getElementById('rotationCountLabel');
  lbl.textContent = n === 0 ? 'Pick your rotation(s)' :
                    n === 1 ? '1 rotation selected' :
                    `${n} rotations selected`;
}

function renderTasks() {
  const main = document.getElementById('taskList');
  main.innerHTML = '';

  // Tasks appear only after the rotation selection is confirmed (selector
  // closed). While the selector is open, show a prompt instead.
  if (!state.selectorHidden) {
    main.innerHTML = '<div class="empty">Pick your rotation(s) above, then tap '
      + '<b>“Click here to confirm rotation selection and close the selector”</b> to see your tasks.</div>';
    updateProgress(0, 0);
    return;
  }

  if (state.selectedRotations.size === 0) {
    main.innerHTML = '<div class="empty">No rotation picked. Reopen the selector to choose one.</div>';
    updateProgress(0, 0);
    return;
  }

  // "Back to selector" CTA — pinned above the task blocks so the user can
  // reopen the picker without scrolling to the header.
  const back = document.createElement('button');
  back.className = 'back-to-selector';
  back.textContent = '‹ Change rotation selection';
  back.addEventListener('click', () => {
    state.selectorHidden = false;
    applySelectorVisibility();
    saveState();
    renderTasks();
    setTimeout(() => {
      document.getElementById('controlsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 30);
  });
  main.appendChild(back);

  const grouped = {};
  for (const rot of state.selectedRotations) grouped[rot] = [];

  for (const row of APP_DATA.rows) {
    if (!state.selectedRotations.has(row.rotation)) continue;
    grouped[row.rotation].push(row);
  }

  // Order rotations by group (using the curated GROUP_ROTATIONS order), then
  // by their position within their group's list.
  const GROUP_ORDER = Object.keys(APP_DATA.groups);
  function groupIndex(r) {
    for (let i = 0; i < GROUP_ORDER.length; i++) {
      const list = APP_DATA.groups[GROUP_ORDER[i]] || [];
      if (list.includes(r)) return i;
    }
    return 99;
  }
  const orderedRotations = [...state.selectedRotations].sort((a, b) => {
    const ga = groupIndex(a), gb = groupIndex(b);
    if (ga !== gb) return ga - gb;
    const list = APP_DATA.groups[GROUP_ORDER[ga]] || [];
    return list.indexOf(a) - list.indexOf(b);
  });

  let totalTasks = 0, doneTasks = 0;

  for (const rotation of orderedRotations) {
    const rows = grouped[rotation];
    // Active tasks first (sorted by time), then completed tasks (sorted by time).
    rows.sort((a, b) => {
      const aDone = state.checks.has(rowKey(a));
      const bDone = state.checks.has(rowKey(b));
      if (aDone !== bDone) return aDone ? 1 : -1;
      return compareTimes(a.time, b.time);
    });

    const block = document.createElement('div');
    block.className = 'rotation-block';
    const token = tokenForRotation(rotation);
    const meta = APP_DATA.rotation_meta[rotation] || {};

    const header = document.createElement('div');
    header.className = 'rotation-header';
    header.dataset.token = token;

    const top = document.createElement('div');
    top.className = 'rotation-header-top';
    const name = document.createElement('div');
    name.className = 'rotation-name';
    // Compose rotation title: name + day tag + shift time.
    // Example: "Evening CVH · Weekday · 16:00–21:59"
    const bits = [escapeHtml(rotation)];
    if (meta.day)   bits.push('<span class="rotation-day-tag">'   + escapeHtml(meta.day)   + '</span>');
    if (meta.shift) bits.push('<span class="rotation-shift-tag">' + escapeHtml(meta.shift) + '</span>');
    name.innerHTML = bits.join(' · ');
    top.appendChild(name);
    const rmeta = document.createElement('div');
    rmeta.className = 'rotation-meta';
    if (rows.length === 0) {
      rmeta.textContent = 'No tasks';
    } else {
      const doneInRot = rows.filter(r => state.checks.has(rowKey(r))).length;
      rmeta.textContent = `${doneInRot} / ${rows.length}`;
    }
    top.appendChild(rmeta);
    header.appendChild(top);
    block.appendChild(header);

    if (rows.length === 0) {
      const empty = document.createElement('div');
      empty.style.padding = '14px';
      empty.style.color = 'var(--muted)';
      empty.style.fontSize = '13px';
      empty.textContent = 'Nothing scheduled for this rotation.';
      block.appendChild(empty);
    } else {
      for (const row of rows) {
        const key = rowKey(row);
        const isDone = state.checks.has(key);
        totalTasks++;
        if (isDone) doneTasks++;

        const taskEl = document.createElement('div');
        taskEl.className = 'task' + (isDone ? ' done' : '')
                                    + (state._justChecked === key ? ' just-checked' : '');

        const check = document.createElement('div');
        check.className = 'check';
        taskEl.appendChild(check);

        const body = document.createElement('div');
        body.className = 'task-body';

        const r1 = document.createElement('div');
        r1.className = 'task-row1';
        if (row.time) {
          const t = document.createElement('span');
          t.className = 'task-time' + (/start/i.test(row.time) ? ' start-time' : '');
          t.textContent = row.time;
          r1.appendChild(t);
        }
        body.appendChild(r1);

        const nameEl = document.createElement('div');
        nameEl.className = 'task-name';
        nameEl.textContent = row.task;
        body.appendChild(nameEl);

        if (row.worklist) {
          const wl = document.createElement('div');
          wl.className = 'task-meta task-worklist';
          wl.innerHTML = '<b>Worklist:</b> ' + escapeHtml(row.worklist);
          body.appendChild(wl);
        }
        if (row.segment) {
          const seg = document.createElement('div');
          seg.className = 'task-meta task-segment';
          seg.innerHTML = '<b>Segment:</b> ' + escapeHtml(row.segment);
          body.appendChild(seg);
        }
        if (row.comments) {
          const cm = document.createElement('div');
          cm.className = 'task-comments';
          cm.textContent = row.comments;
          body.appendChild(cm);
        }
        taskEl.appendChild(body);

        taskEl.addEventListener('click', (ev) => {
          ev.preventDefault();
          const wasDone = state.checks.has(key);
          if (wasDone) {
            state.checks.delete(key);
            state._justChecked = null;
          } else {
            state.checks.add(key);
            state._justChecked = key;
            if (typeof spinBadge === 'function') spinBadge();
            if (navigator.vibrate) {
              try { navigator.vibrate(10); } catch (e) {}
            }
            if (rows.length > 0 && rows.every(r => state.checks.has(rowKey(r)))) {
              if (typeof fireConfetti === 'function') fireConfetti();
              if (navigator.vibrate) { try { navigator.vibrate([12, 40, 12]); } catch (e) {} }
            }
          }
          saveChecks();
          const doRender = () => {
            renderTasks();
            setTimeout(() => { state._justChecked = null; }, 150);
          };
          if (document.startViewTransition) {
            try { document.startViewTransition(doRender); }
            catch (e) { doRender(); }
          } else {
            doRender();
          }
        });

        block.appendChild(taskEl);
      }
    }
    main.appendChild(block);
  }
  updateProgress(doneTasks, totalTasks);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function updateProgress(done, total) {
  document.getElementById('progressText').textContent =
    total === 0 ? '—' : `${done}/${total}`;
  document.getElementById('progressFill').style.width =
    total === 0 ? '0%' : `${Math.round(100 * done / total)}%`;
}

// ---------- bind global controls ----------
document.getElementById('selectorToggleBtn').addEventListener('click', () => {
  state.selectorHidden = !state.selectorHidden;
  applySelectorVisibility();
  saveState();
  renderTasks();
  if (state.selectorHidden) {
    setTimeout(() => {
      document.getElementById('taskList').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
});
document.getElementById('fontUpBtn').addEventListener('click', () => bumpFont(FONT_STEP));
document.getElementById('fontDownBtn').addEventListener('click', () => bumpFont(-FONT_STEP));
document.getElementById('resetBtn').addEventListener('click', () => {
  state.selectedRotations.clear();
  saveState();
  renderRotationPicker();
  renderRotationCount();
  renderTasks();
});
document.getElementById('resetTodayBtn').addEventListener('click', () => {
  if (confirm("Reset today's checked items?")) {
    state.checks.clear();
    saveChecks();
    renderTasks();
  }
});
document.getElementById('themeLightBtn').addEventListener('click', () => setTheme('light'));
document.getElementById('themeDarkBtn').addEventListener('click', () => setTheme('dark'));

// ---------- menu ----------
const menuBtn = document.getElementById('menuBtn');
const menuOverlay = document.getElementById('menuOverlay');

function openMenu() { menuOverlay.hidden = false; }
function closeMenu() { menuOverlay.hidden = true; }

menuBtn.addEventListener('click', openMenu);
menuOverlay.addEventListener('click', (e) => {
  if (e.target === menuOverlay) closeMenu();
});

menuOverlay.querySelectorAll('.menu-item').forEach(item => {
  item.addEventListener('click', (e) => {
    const action = item.dataset.action;
    if (action === 'cancel') {
      e.preventDefault();
      closeMenu();
    } else if (action === 'pdf-rotation') {
      e.preventDefault();
      closeMenu();
      openPdfViewer('THP-Call-RR.pdf', 'THP Call RR — by rotation');
    } else if (action === 'pdf-source') {
      e.preventDefault();
      closeMenu();
      openPdfViewer('THP-Call-Reporting-Responsibilities-source.pdf',
                    "Ivan Diamond's original source PDF");
    }
  });
});

// ---------- in-app PDF viewer ----------
const pdfViewer = document.getElementById('pdfViewer');
const pdfFrame = document.getElementById('pdfFrame');
const pdfTitle = document.getElementById('pdfViewerTitle');
const pdfFallback = document.getElementById('pdfOpenExternal');
function openPdfViewer(url, title) {
  pdfTitle.textContent = title;
  pdfFallback.href = url;
  pdfFrame.src = url;
  pdfViewer.hidden = false;
  document.body.style.overflow = 'hidden';
}
function closePdfViewer() {
  pdfViewer.hidden = true;
  pdfFrame.src = 'about:blank';
  document.body.style.overflow = '';
}
document.getElementById('pdfCloseBtn').addEventListener('click', closePdfViewer);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !pdfViewer.hidden) closePdfViewer();
});

// New-day rollover: if the app is left open or resumed across midnight,
// reset to a clean slate (clear selections, reopen the selector, reload that
// day's checks). Call app has no auto-selected weekday to restore.
function checkDayRollover() {
  const cur = todayKey();
  if (!state._loadedKey || state._loadedKey === cur) return;
  state._loadedKey = cur;
  state.checks = loadTodaysChecks();
  state.selectedRotations.clear();
  state.selectorHidden = false;
  saveState();
  renderRotationPicker();
  renderRotationCount();
  applySelectorVisibility();
  renderTasks();
}
setInterval(checkDayRollover, 60 * 1000);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkDayRollover();
});
window.addEventListener('pageshow', checkDayRollover);
state._loadedKey = todayKey();

// Initial render
setTheme(state.theme);
applyFontScale();
applySelectorVisibility();
renderHeader();
renderTodayDate();
renderRotationPicker();
renderRotationCount();
renderTasks();

// ---------- confetti when a whole rotation is checked off ----------
function fireConfetti() {
  const colors = ['#E8A020', '#F5C842', '#0D2E3A', '#5FC8D8',
                  '#C00000', '#548235', '#2E75B6', '#BF8F00'];
  const layer = document.createElement('div');
  layer.className = 'confetti-layer';
  document.body.appendChild(layer);

  const W = window.innerWidth || 380;
  const H = window.innerHeight || 700;
  const N = 90;
  for (let i = 0; i < N; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const size = 6 + Math.random() * 6;
    p.style.width = size + 'px';
    p.style.height = (size * 0.45 + 4) + 'px';
    p.style.background = colors[i % colors.length];
    layer.appendChild(p);

    const startX = Math.random() * W;
    const drift = (Math.random() * 2 - 1) * 140;
    const rot = (Math.random() * 1080) - 540;
    const dur = 1600 + Math.random() * 1600;
    const delay = Math.random() * 250;
    const fromY = -0.12 * H, toY = 1.15 * H;
    const frames = [
      { transform: 'translate(' + startX + 'px,' + fromY + 'px) rotate(0deg)', opacity: 1 },
      { transform: 'translate(' + (startX + drift) + 'px,' + toY + 'px) rotate(' + rot + 'deg)', opacity: 1 },
    ];
    if (p.animate) {
      p.animate(frames, { duration: dur, delay: delay,
                          easing: 'cubic-bezier(0.25,0.6,0.4,1)', fill: 'forwards' });
    } else {
      p.style.transform = frames[0].transform;
      p.style.transition = 'transform ' + dur + 'ms ease ' + delay + 'ms';
      requestAnimationFrame(() => { p.style.transform = frames[1].transform; });
    }
  }
  setTimeout(() => layer.remove(), 3600);
}

// Spin the whole logo on a task check — a subtle "done!" cue. The Call app's
// icon is a raster PNG (Moon logo), so we spin the whole element rather than
// a sub-group of SVG paths.
function spinBadge() {
  const logo = document.getElementById('hLogo');
  if (!logo) return;
  logo.classList.remove('spinning');
  void logo.getBoundingClientRect();
  logo.classList.add('spinning');
}
window.addEventListener('load', () => setTimeout(spinBadge, 200));

// ---------- service worker (auto-update PWA shell) ----------
if ('serviceWorker' in navigator) {
  let hadController = !!navigator.serviceWorker.controller;
  let reloading = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (reloading) return;
    if (hadController) {
      reloading = true;
      window.location.reload();
    } else {
      hadController = true;
    }
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => { reg.update(); })
      .catch(() => {});
  });
}
